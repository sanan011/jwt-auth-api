spring:
  application:
    name: jwt-auth-api
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/jwt_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  secret: ${JWT_SECRET:a_very_long_default_secret_key_for_jwt_which_should_be_secure}
  expiration: ${JWT_EXPIRATION:86400000} # default to 24 hours in milliseconds
